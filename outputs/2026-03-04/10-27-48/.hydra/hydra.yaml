hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm.adv_estimator=grpo
    - +ray_kwargs.ray_init.include_dashboard=False
    - data.train_files=['/workspace/SAGE/data/rlmia_aime24_25.parquet']
    - data.val_files=['/workspace/SAGE/data/valid_aime.parquet']
    - data.shuffle=True
    - data.train_batch_size=32
    - data.val_batch_size=256
    - data.max_prompt_length=1024
    - data.max_response_length=4096
    - actor_rollout_ref.model.path=Qwen/Qwen3-4B-Instruct-2507
    - actor_rollout_ref.model.use_remove_padding=True
    - actor_rollout_ref.model.enable_gradient_checkpointing=True
    - actor_rollout_ref.actor.optim.lr=1e-6
    - actor_rollout_ref.actor.entropy_coeff=0.001
    - actor_rollout_ref.actor.ppo_mini_batch_size=4
    - actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=2
    - actor_rollout_ref.actor.use_dynamic_bsz=True
    - actor_rollout_ref.actor.ppo_max_token_len_per_gpu=16384
    - actor_rollout_ref.actor.kl_loss_coef=0.0
    - actor_rollout_ref.actor.kl_loss_type=low_var_kl
    - actor_rollout_ref.actor.use_kl_loss=False
    - actor_rollout_ref.actor.ulysses_sequence_parallel_size=1
    - actor_rollout_ref.actor.fsdp_config.param_offload=False
    - actor_rollout_ref.actor.fsdp_config.optimizer_offload=False
    - actor_rollout_ref.actor.fsdp_config.model_dtype=bf16
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.max_num_seqs=64
    - actor_rollout_ref.rollout.enable_chunked_prefill=False
    - actor_rollout_ref.rollout.enable_prefix_caching=False
    - actor_rollout_ref.rollout.prompt_length=1024
    - actor_rollout_ref.rollout.response_length=4096
    - actor_rollout_ref.rollout.temperature=1.0
    - actor_rollout_ref.rollout.val_kwargs.temperature=0.6
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.30
    - actor_rollout_ref.rollout.n=4
    - actor_rollout_ref.ref.fsdp_config.param_offload=True
    - algorithm.kl_ctrl.kl_coef=0.0
    - trainer.critic_warmup=0
    - trainer.logger=['console','wandb']
    - trainer.project_name=GRPO
    - trainer.experiment_name=Qwen3-4B-Instruct-2507-aime
    - trainer.val_before_train=True
    - trainer.n_gpus_per_node=8
    - trainer.nnodes=1
    - trainer.save_freq=50
    - trainer.test_freq=1
    - trainer.max_actor_ckpt_to_keep=2
    - trainer.max_critic_ckpt_to_keep=2
    - trainer.total_epochs=5
    - trainer.default_hdfs_dir=null
    - trainer.default_local_dir=/workspace/SAGE/checkpoints/GRPO/Qwen3-4B-Instruct-2507-aime
  job:
    name: main_ppo
    chdir: null
    override_dirname: +ray_kwargs.ray_init.include_dashboard=False,actor_rollout_ref.actor.entropy_coeff=0.001,actor_rollout_ref.actor.fsdp_config.model_dtype=bf16,actor_rollout_ref.actor.fsdp_config.optimizer_offload=False,actor_rollout_ref.actor.fsdp_config.param_offload=False,actor_rollout_ref.actor.kl_loss_coef=0.0,actor_rollout_ref.actor.kl_loss_type=low_var_kl,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_max_token_len_per_gpu=16384,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=2,actor_rollout_ref.actor.ppo_mini_batch_size=4,actor_rollout_ref.actor.ulysses_sequence_parallel_size=1,actor_rollout_ref.actor.use_dynamic_bsz=True,actor_rollout_ref.actor.use_kl_loss=False,actor_rollout_ref.model.enable_gradient_checkpointing=True,actor_rollout_ref.model.path=Qwen/Qwen3-4B-Instruct-2507,actor_rollout_ref.model.use_remove_padding=True,actor_rollout_ref.ref.fsdp_config.param_offload=True,actor_rollout_ref.rollout.enable_chunked_prefill=False,actor_rollout_ref.rollout.enable_prefix_caching=False,actor_rollout_ref.rollout.gpu_memory_utilization=0.30,actor_rollout_ref.rollout.max_num_seqs=64,actor_rollout_ref.rollout.n=4,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.prompt_length=1024,actor_rollout_ref.rollout.response_length=4096,actor_rollout_ref.rollout.temperature=1.0,actor_rollout_ref.rollout.tensor_model_parallel_size=1,actor_rollout_ref.rollout.val_kwargs.temperature=0.6,algorithm.adv_estimator=grpo,algorithm.kl_ctrl.kl_coef=0.0,data.max_prompt_length=1024,data.max_response_length=4096,data.shuffle=True,data.train_batch_size=32,data.train_files=['/workspace/SAGE/data/rlmia_aime24_25.parquet'],data.val_batch_size=256,data.val_files=['/workspace/SAGE/data/valid_aime.parquet'],trainer.critic_warmup=0,trainer.default_hdfs_dir=null,trainer.default_local_dir=/workspace/SAGE/checkpoints/GRPO/Qwen3-4B-Instruct-2507-aime,trainer.experiment_name=Qwen3-4B-Instruct-2507-aime,trainer.logger=['console','wandb'],trainer.max_actor_ckpt_to_keep=2,trainer.max_critic_ckpt_to_keep=2,trainer.n_gpus_per_node=8,trainer.nnodes=1,trainer.project_name=GRPO,trainer.save_freq=50,trainer.test_freq=1,trainer.total_epochs=5,trainer.val_before_train=True
    id: ???
    num: ???
    config_name: ppo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /workspace/SAGE
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/SAGE/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /workspace/SAGE/outputs/2026-03-04/10-27-48
    choices:
      reward_model: dp_reward_model
      critic: dp_critic
      critic/../engine@critic.model.fsdp_config: fsdp
      critic/../optim@critic.optim: fsdp
      model@actor_rollout_ref.model: hf_model
      rollout@actor_rollout_ref.rollout: rollout
      ref@actor_rollout_ref.ref: dp_ref
      ref/../engine@actor_rollout_ref.ref.fsdp_config: fsdp
      data: legacy_data
      actor@actor_rollout_ref.actor: dp_actor
      actor/../engine@actor_rollout_ref.actor.fsdp_config: fsdp
      actor/../optim@actor_rollout_ref.actor.optim: fsdp
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
